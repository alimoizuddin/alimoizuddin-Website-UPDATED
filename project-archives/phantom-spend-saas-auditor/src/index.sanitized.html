<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Financial Auditor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Custom scrollbar for a sleeker look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-8 font-sans selection:bg-indigo-500/30 relative overflow-x-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[600px] bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState } = React;

        function Dashboard() {
            const [loading, setLoading] = useState(false);
            const [results, setResults] = useState(null);
            const [error, setError] = useState(null);
            const [uploadedFileName, setUploadedFileName] = useState('');
            const [csvRawText, setCsvRawText] = useState(null);

            // Completely streamlined upload handler - grabs raw text only
            const handleCSVUpload = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;

                setUploadedFileName(file.name);
                setCsvRawText(null);
                setError(null);

                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target?.result;
                    if (text) {
                        setCsvRawText(text);
                    } else {
                        setError('Failed to extract text from the file.');
                    }
                };
                reader.onerror = () => setError('Failed to read the selected file.');
                reader.readAsText(file);
            };

            const runAudit = async () => {
                setLoading(true);
                setError(null);

                if (!csvRawText) {
                    setError('Please upload a CSV expense report before running the audit.');
                    setLoading(false);
                    return;
                }

                try {
                    // NOTE: If testing the final deployment, ensure this is the Production Webhook URL (no '/test/')
                    const response = await fetch('https://YOUR_N8N_DOMAIN/webhook/YOUR_WEBHOOK_ID', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ raw_csv_text: csvRawText })
                    });
                    
                    if (!response.ok) throw new Error("Network response was not ok");
                    
                    const data = await response.json();
                    setResults(data);
                } catch (err) {
                    setError("Failed to connect to n8n pipeline. Make sure the webhook is listening.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div class="max-w-5xl mx-auto mt-8">
                    {/* Glass Header & Upload Container */}
                    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8 mb-8 shadow-2xl">
                        <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-8">
                            <div>
                                <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-blue-400 bg-clip-text text-transparent">
                                    Phantom-Spend Auditor
                                </h1>
                                <p class="text-slate-400 mt-2 font-medium">Autonomous SaaS overlap detection & financial routing</p>
                            </div>

                            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 w-full lg:w-auto">
                                <div class="relative w-full sm:w-72">
                                    <input
                                        type="file"
                                        accept=".csv,text/csv"
                                        onChange={handleCSVUpload}
                                        disabled={loading}
                                        class="block w-full text-sm text-slate-300 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-white/10 file:text-slate-200 hover:file:bg-white/20 hover:file:text-white transition-all cursor-pointer disabled:opacity-50 border border-white/10 rounded-lg bg-black/20"
                                    />
                                    <div class="absolute -bottom-6 left-1 text-xs text-slate-500 font-medium">
                                        {uploadedFileName ? `Attached: ${uploadedFileName}` : 'Awaiting CSV file...'}
                                    </div>
                                </div>

                                <button
                                    onClick={runAudit}
                                    disabled={loading}
                                    class={`relative overflow-hidden group bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold py-3 px-8 rounded-xl transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed shadow-[0_0_20px_rgba(79,70,229,0.3)] hover:shadow-[0_0_30px_rgba(79,70,229,0.5)] ${loading ? 'animate-pulse' : ''}`}
                                >
                                    <span class="relative z-10">{loading ? 'Executing Audit...' : 'Run Autonomous Audit'}</span>
                                    <div class="absolute inset-0 h-full w-full bg-gradient-to-r from-blue-600 to-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                </button>
                            </div>
                        </header>
                    </div>

                    {error && (
                        <div class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl mb-8 flex items-center backdrop-blur-md shadow-lg">
                            <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
                            <span class="font-medium">{error}</span>
                        </div>
                    )}

                    {results && (
                        <div class="animate-fade-in space-y-8">
                            {/* KPI Card */}
                            <div class={`rounded-2xl p-8 text-center backdrop-blur-xl border shadow-2xl transition-all duration-500 ${results.total_wasted_capital > 0 ? 'bg-red-500/5 border-red-500/20 shadow-[0_0_40px_rgba(239,68,68,0.1)]' : 'bg-white/5 border-white/10'}`}>
                                <h2 class="text-slate-400 text-sm uppercase tracking-[0.2em] font-bold mb-3">Total Wasted Capital</h2>
                                <div class="flex items-baseline justify-center gap-2">
                                    <p class={`text-7xl font-extrabold ${results.total_wasted_capital > 0 ? 'text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.4)]' : 'text-emerald-400'}`}>
                                        ${results.total_wasted_capital.toFixed(2)}
                                    </p>
                                    <span class="text-2xl text-slate-500 font-medium">/ mo</span>
                                </div>
                            </div>

                            {/* Data Table */}
                            <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl overflow-hidden shadow-2xl">
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left border-collapse">
                                        <thead>
                                            <tr class="bg-black/40 border-b border-white/5 text-slate-400 text-xs uppercase tracking-wider">
                                                <th class="p-5 font-semibold">SaaS Tool</th>
                                                <th class="p-5 font-semibold">Monthly Cost</th>
                                                <th class="p-5 font-semibold">Redundant With</th>
                                                <th class="p-5 font-semibold text-right">Action Recommended</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-white/5">
                                            {results.audit_results.map((item, index) => {
                                                const action = item.action_recommendation.toUpperCase();
                                                const isCancel = action === 'CANCEL';
                                                const isConsolidate = action === 'CONSOLIDATE';
                                                
                                                let badgeClass = 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';
                                                if (isCancel) badgeClass = 'bg-red-500/10 text-red-400 border-red-500/20 shadow-[0_0_10px_rgba(239,68,68,0.2)]';
                                                if (isConsolidate) badgeClass = 'bg-amber-500/10 text-amber-400 border-amber-500/20';

                                                return (
                                                    <tr key={index} class="transition-colors hover:bg-white/[0.03] group">
                                                        <td class="p-5 font-semibold text-slate-200">{item.tool_name}</td>
                                                        <td class="p-5 text-slate-300 font-medium">${item.monthly_cost.toFixed(2)}</td>
                                                        <td class="p-5 text-slate-400">{item.redundant_with || '-'}</td>
                                                        <td class="p-5 text-right">
                                                            <span class={`inline-block px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest border ${badgeClass}`}>
                                                                {action}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Add simple fade-in animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        `;
        document.head.appendChild(style);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
